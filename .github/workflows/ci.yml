name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Only report issues in changed code (not pre-existing).
          # PRs: diff against base branch. Pushes: diff against parent commit.
          args: >-
            --new-from-rev=${{ github.event_name == 'pull_request'
                && github.event.pull_request.base.sha
                || format('{0}~1', github.sha) }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -count=1 ./...

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run fuzz targets
        run: |
          fuzz_targets=$(grep -r --include='*_test.go' -l 'func Fuzz' . || true)
          if [ -z "$fuzz_targets" ]; then
            echo "No fuzz targets found, skipping"
            exit 0
          fi
          for file in $fuzz_targets; do
            dir=$(dirname "$file")
            funcs=$(grep -oP 'func (Fuzz\w+)' "$file" | awk '{print $2}')
            for func in $funcs; do
              echo "Fuzzing $func in $dir for 30s..."
              go test -fuzz="^${func}$" -fuzztime=30s "$dir"
            done
          done
